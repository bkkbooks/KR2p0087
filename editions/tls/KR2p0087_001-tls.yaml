body:
  text: 其之史留曰留也故齊邦敝吏之子也亡女茹圖也聞子之言大懼不知所為夫子曰善哉臨事而懼此不既死之以其子子其身信之貳惑也今使子師之君之擇之慎矣也史蒥曰何謂八夫子曰內邪偽幽色与酒大鐘鼎美宮室驅軹畋獵舉訟獄此所以失不可以弗戒子之事行百姓得其利邦家以𢕌夷子之事不行百姓必在危其邦家則能貴潰於禹湯禹湯則學自始有民以來未或能才立栽粒在立於地之上一或不免有禍不史蒥曰何謂信何謂敬夫子曰敬也者瞻人之顏色而為之為視其所欲而民氓不可侮衆之所植莫之能廢也衆之上六孔莫之能豎也史極聽常啟同通古
